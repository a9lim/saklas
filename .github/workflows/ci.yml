name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Install dev extras so pyright can resolve torch / transformers /
      # safetensors when it analyzes the public API surface.
      - run: pip install -e ".[dev]"
      - run: pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q -m "not gpu"

  build:
    # Validates the PEP 621 dynamic-version setup in pyproject.toml: confirms
    # ``python -m build`` resolves ``saklas.__version__`` via AST parse without
    # executing the module (which would import torch and break the build).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Verify wheel imports and version round-trips
        run: |
          pip install dist/saklas-*.whl
          python -c "import saklas; print('version:', saklas.__version__)"

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm run check
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - name: Verify committed web bundle is current
        run: git diff --exit-code saklas/web/dist/
