name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Install dev extras so pyright can resolve runtime/test dependencies
      # while it analyzes the package, tests, examples, and maintained scripts.
      - run: pip install -e ".[dev]"
      - run: pyright

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # Coverage is informational only — no --cov-fail-under, and --cov stays out
      # of pyproject addopts so local runs without pytest-cov keep working.
      - run: pytest -q -m "not gpu" --cov=saklas --cov-report=term-missing

  # Stable aggregator so branch protection can require a single ``test`` context
  # instead of every ``test-matrix (x.y)`` leg by name. ``if: always()`` makes the
  # gate run even when a leg fails, and the explicit result check turns a failed or
  # skipped matrix into a failed gate (a skipped required check would otherwise let
  # a PR merge).
  test:
    runs-on: ubuntu-latest
    needs: [test-matrix]
    if: always()
    steps:
      - name: Verify the test matrix succeeded
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "test-matrix did not succeed: ${{ needs.test-matrix.result }}"
            exit 1
          fi

  build:
    # Validates the PEP 621 dynamic-version setup in pyproject.toml: confirms
    # ``python -m build`` resolves ``saklas.__version__`` via AST parse without
    # executing the module (which would import torch and break the build).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Verify wheel imports and version round-trips
        run: |
          pip install dist/saklas-*.whl
          python -c "import saklas; print('version:', saklas.__version__)"

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - run: npm ci
        working-directory: webui
      - run: npm run check
        working-directory: webui
      - run: npm run build
        working-directory: webui
      - name: Verify committed web bundle is current
        run: git diff --exit-code saklas/web/dist/
