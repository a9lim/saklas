repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
  # Pyright runs against the package, tests, examples, and maintained scripts
  # (the include list in pyproject.toml). Mirrors what CI runs
  # so type-regression catches happen at commit time rather than PR.
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.400
    hooks:
      - id: pyright
        # pyright resolves third-party stubs at lint time; install the
        # runtime deps it needs to type-check the configured project surface.
        additional_dependencies:
          - torch>=2.2
          - transformers>=5.10
          - safetensors>=0.7.0
          - fastapi>=0.110
          - pyyaml>=6.0
